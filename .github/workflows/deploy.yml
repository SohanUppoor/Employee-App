name: Build and Upload Employee App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    # Setup Node for React
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # Build React Frontend
    - name: Install Frontend Dependencies
      run: npm install
      working-directory: frontend

    - name: Build React App
      run: npm run build
      working-directory: frontend

    # Copy React build to Spring Boot static folder
    - name: Copy Frontend Build to Backend
      run: |
        mkdir -p backend/src/main/resources/static/
        rm -rf backend/src/main/resources/static/*
        cp -r frontend/dist/* backend/src/main/resources/static/

    #Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven
      run: mvn clean package -DskipTests
      working-directory: backend

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Upload JAR to S3
      run: |
        aws s3 cp backend/target/employeeapp-0.0.1-SNAPSHOT.jar s3://${{ secrets.ARTIFACT_BUCKET_NAME }}/builds/employeeapp.jar